{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="text-center mb-4">Post a New Placement Drive</h3>
                    
                    <form action="{{ url_for('create_drive') }}" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label">Job Title</label>
                            <input type="text" name="title" class="form-control" placeholder="e.g. Software Engineer" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Job Description</label>
                            <textarea name="desc" class="form-control" rows="5" placeholder="Describe the role, responsibilities, and benefits..." required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Post Drive</button>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
